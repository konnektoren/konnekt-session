[build]
# Point to the parent crate
target = "index.html"

dist = "dist"

[watch]
# Watch local and workspace crates used by the Yew app
watch = [
    "src",
    "../konnekt-session-core/src",
    "../konnekt-session-p2p/src",
    "../konnekt-session-bevy/src",
]

[serve]
# Serve configuration
port = 8080
